<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToyinJr X Anchorsoft</title>
    <link rel="stylesheet" href="./src/output.css" />
    <script
      src="https://kit.fontawesome.com/7bb4f10b78.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="bg-linear-to-r from-purple-200 to-pink-200 min-h-screen">
      <!-- Navbar -->
      <nav
        class="flex max-[700px]:flex-col justify-between items-center px-4 sticky top-0 z-99 bg-white"
      >
        <div
          class="flex justify-center items-center gap-2 max-[900px]:scale-75"
        >
          <img src="./images/TOYINJR.png" class="h-32" alt="toyinjr" />
          <i class="fa-solid fa-x text-4xl"></i>
          <img
            src="./images/anchorsoftLogo.png"
            class="h-20"
            alt="anchorsoftLogo"
          />
        </div>

        <div
          class="flex gap-4"
        >
         <a href="https://www.linkedin.com/in/toyinjr/" target="_blank" class="hover:scale-110 transition ease-in-out duration-500"><i class="fa-brands fa-linkedin text-4xl"></i></a>
         <a href="https://github.com/ToyinJr" target="_blank" class="hover:scale-110 transition ease-in-out duration-500"><i class="fa-brands fa-github text-4xl"></i></a>
        </div>
      </nav>

      <!-- Main Section  -->
      <main class="px-12">

        <!-- Intro Section  -->
        <section
          class="py-4 flex flex-col gap-2 md:flex-row justify-evenly items-center"
        >
          <div class="flex flex-col gap-4">
            <p class=" md:text-2xl text-center">
              Hello, my name is Obafemi Oluwatoyin. <br />
              I am currently learning fullstack web development at <a href="https://www.anchorsoftacademy.com/" target="_blank"><span class="font-bold text-2xl text-[#008ecc]">Anchorsoft Academy</span></a>
            </p>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3963.3837384803587!2d3.344284875019028!3d6.599140422279682!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x103b92257d9418a3%3A0x374015c3cdc9cca2!2s2b%20Yinusa%20Adeniji%20St%2C%20Allen%2C%20Ikeja%20101233%2C%20Lagos!5e0!3m2!1sen!2sng!4v1774270241700!5m2!1sen!2sng"
              height="350"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              class="hover:scale-110 transition ease-in-out duration-500"
            ></iframe>
          </div>

          <img src="./images/me2.png" class="w-60" alt="toyin" />
        </section>

        <!-- Projects Section  -->
        <section class="py-4">
          <p class="text-lg md:text-2xl text-center">
            Some of the projects I've worked on
          </p>

          <div class="py-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 ">
            <div class="card w-fit hover:scale-110 transition ease-in-out duration-500">
              <a
                href="https://remarkable-kataifi-40a06c.netlify.app/"
                target="_blank"
              >
                <p class="text-center">BrandName</p>
                <img
                  src="./images/brandname.png"
                  class="w-[500px] h-64"
                  alt="brandname"
                />
              </a>
            </div>

            <div class="card w-fit hover:scale-110 transition ease-in-out duration-500">
              <a href="https://bankingly.netlify.app/" target="_blank">
                <p class="text-center">Bankingly</p>
                <img
                  src="./images/bankingly.png"
                  class="w-[500px] h-64"
                  alt="bankingly"
                />
              </a>
            </div>

            <div class="card w-fit hover:scale-110 transition ease-in-out duration-500">
              <a
                href="https://candid-squirrel-3f19f1.netlify.app/"
                target="_blank"
              >
                <p class="text-center">Landing Page</p>
                <img
                  src="./images/landing.png"
                  class="w-[500px] h-64"
                  alt="landingpage"
                />
              </a>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
